description: >-
  Constellation Energy Corporation is a Fortune 500 clean-energy producer
  and competitive retail electricity and natural gas supplier in the United
  States, generating power from a fleet of nuclear, hydro, wind, and solar
  facilities. Constellation does not publish a public developer portal;
  programmatic interactions are delivered to enterprise and large commercial
  customers through the Energy Manager platform (account-managed onboarding,
  no public API specifications) and consumer interactions are handled through
  the My Constellation account portal. EDI 867 (usage) and 810 (invoice)
  remain the most common machine-to-machine integration paths and are
  arranged on a contract-by-contract basis.
